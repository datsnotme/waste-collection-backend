<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waste Collection - Admin Login</title>

  <style>
    :root{
      --green-dark:#1b5e20;     /* your existing theme */
      --green:#2e7d32;
      --green-soft:#e8f5e9;
      --text:#1c1c1c;
      --muted:#7a7a7a;
      --card:#ffffff;
      --shadow: 0 10px 30px rgba(0,0,0,.12);
      --radius: 18px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f9;
      color: var(--text);
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 20px;
    }

    /* ====== MAIN LAYOUT ====== */
    .wrap{
      width: min(1200px, 100%);
      background: #fff;
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow:hidden;
      display:grid;
      grid-template-columns: 1.2fr 0.8fr;
      min-height: 520px;
    }

    /* ====== LEFT HERO ====== */
    .hero{
      position:relative;
      padding: 48px 48px 32px 48px;
      background: linear-gradient(135deg, #ffffff 0%, var(--green-soft) 100%);
    }

    .hero h1{
      margin:0;
      font-size: clamp(34px, 3.6vw, 56px);
      line-height: 1.05;
      letter-spacing: .5px;
      color: var(--green-dark);
      font-weight: 800;
      text-transform: none;
    }

    .hero .sub{
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      max-width: 520px;
    }

    .truck{
      position:absolute;
      left: 28px;
      bottom: 18px;
      width: min(520px, 92%);
      max-height: 320px;
      object-fit: contain;
      filter: drop-shadow(0 10px 12px rgba(0,0,0,.18));
    }

    /* ====== RIGHT LOGIN CARD AREA ====== */
    .side{
      background: #f7fbf7;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 32px 22px;
    }

    .login-card{
      width: min(420px, 100%);
      background: var(--green-dark);
      border-radius: var(--radius);
      padding: 28px 26px;
      box-shadow: var(--shadow);
      color: #fff;
      position:relative;
    }

    .login-title{
      text-align:center;
      font-size: 32px;
      font-weight: 800;
      margin: 4px 0 18px 0;
      letter-spacing: .3px;
    }

    .error{
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      color: #fff;
      padding: 10px 12px;
      border-radius: 12px;
      margin-bottom: 14px;
      font-size: 14px;
    }

    .field{
      margin: 12px 0;
    }

    .input{
      width: 100%;
      padding: 14px 14px;
      border: none;
      border-radius: 12px;
      outline: none;
      font-size: 16px;
      background: #fff;
      color: #222;
    }

    .input::placeholder{
      color:#9a9a9a;
      font-weight: 600;
      text-transform: lowercase;
      letter-spacing: .2px;
    }

    .btn{
      width: 180px;
      margin: 18px auto 0 auto;
      display:block;
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: var(--green);
      color: #fff;
      font-weight: 800;
      font-size: 18px;
      box-shadow: 0 10px 18px rgba(0,0,0,.18);
      transition: transform .08s ease, opacity .2s ease;
    }

    .btn:hover{ opacity: .95; }
    .btn:active{ transform: scale(.98); }

    .hint{
      margin-top: 16px;
      text-align:center;
      font-size: 12px;
      opacity: .85;
    }

    /* ====== RESPONSIVE ====== */
    @media (max-width: 980px){
      .wrap{
        grid-template-columns: 1fr;
        min-height: unset;
      }
      .hero{
        padding: 32px 24px 240px 24px;
      }
      .truck{
        left: 50%;
        transform: translateX(-50%);
        bottom: 10px;
      }
      .side{
        padding: 22px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- LEFT SIDE (TITLE + TRUCK IMAGE) -->
    <div class="hero">
      <h1>Waste Collection<br/>Management<br/>System</h1>
      <div class="sub">
        <!-- Admin panel for managing collection schedules and announcements -->
      </div>

      <!-- Put Truck.jpg inside: static/images/Truck.jpg -->
      <img class="truck" src="{{ url_for('static', filename='images/Truck.png') }}" alt="Truck" />
    </div>

    <!-- RIGHT SIDE (LOGIN BOX) -->
    <div class="side">
      <div class="login-card">
        <div class="login-title">Admin Login</div>

        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
          <div class="field">
            <input class="input" type="text" name="username" placeholder="username" required />
          </div>

          <div class="field">
            <input class="input" type="password" name="password" placeholder="password" required />
          </div>

          <button class="btn" type="submit">Login</button>
        </form>

        <div class="hint">All rights reserved</div>
      </div>
    </div>

  </div>
</body>
</html>
