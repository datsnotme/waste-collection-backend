<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{ title or "Waste Collection Management System" }}</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#f6f8f7; }
    header { background:#0f6d3f; color:#fff; padding:14px 18px; display:flex; justify-content:space-between; align-items:center; }
    header a { color:#fff; text-decoration:none; margin-left:12px; font-weight:bold; }
    .wrap { max-width:1100px; margin:18px auto; padding:0 16px; }
    .card { background:#fff; border-radius:12px; padding:16px; box-shadow:0 2px 10px rgba(0,0,0,.06); margin-bottom:14px; }
    .btn { border:0; padding:10px 14px; border-radius:10px; cursor:pointer; font-weight:bold; }
    .btn-green { background:#1aa05f; color:#fff; }
    .btn-red { background:#e53935; color:#fff; }
    .btn-gray { background:#e9ecef; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px; border-bottom:1px solid #eee; text-align:left; font-size:14px; }
    th { background:#f2f6f4; }
    .badge { padding:4px 10px; border-radius:999px; font-size:12px; font-weight:bold; }
    .active { background:#e8fff1; color:#0f6d3f; }
    .inactive { background:#ffecec; color:#b71c1c; }
    input, select { width:100%; padding:10px; border:1px solid #ddd; border-radius:10px; }
    .grid { display:grid; gap:12px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    @media (max-width: 700px){ .grid{ grid-template-columns:1fr; } }
    .toplinks a { margin-right:10px; }
  </style>
</head>
<body>
<header>
  <div><b>Waste Collection Admin</b></div>
  <div class="toplinks">
    <a href="/dashboard">Dashboard</a>
    <a href="/add_schedule">Add Schedule</a>
    <a href="/manage_residents">Residents</a>
    <a href="/manage_admins">Admins</a>
    <a href="/logout">Logout</a>
  </div>
</header>

<div class="wrap">
  {% block content %}{% endblock %}
</div>
</body>
</html>
